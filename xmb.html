<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PSP XMB Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключаем иконки и шрифты -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            --transition-speed: 0.3s;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            /* Имитация шрифта PSP */
            font-family: 'Inter', sans-serif;
            color: white;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #waves-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(circle at center, #2563eb, #001a4d);
        }

        .xmb-container {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        /* Horizontal Menu */
        .horizontal-bar {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            padding-left: 15%; 
        }

        .category-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 140px;
            transition: all var(--transition-speed) ease;
            opacity: 0.4;
            transform: scale(0.7);
        }

        .category-item.active {
            opacity: 1;
            transform: scale(1.1);
        }

        .category-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .category-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: var(--text-shadow);
            position: absolute;
            bottom: -35px;
            white-space: nowrap;
            font-weight: 300;
        }

        /* Vertical Submenu */
        .vertical-bar {
            position: absolute;
            left: 15%; 
            margin-left: 55px;
            top: 55%;
            display: flex;
            flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .sub-item {
            padding: 12px 24px;
            font-size: 1.2rem;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.3s ease;
            white-space: nowrap;
            text-shadow: var(--text-shadow);
            border-left: 0px solid white;
        }

        /* Показываем только для активной категории */
        .category-item.active ~ .vertical-bar .sub-item {
            /* Это правило будет управляться через JS для точности */
        }

        .sub-item.visible {
            opacity: 0.6;
            transform: translateX(0);
        }

        .sub-item.active {
            opacity: 1;
            background: linear-gradient(90deg, rgba(255,255,255,0.15) 0%, transparent 100%);
            border-left: 4px solid white;
            padding-left: 30px;
        }

        /* UI Elements */
        .clock {
            position: absolute;
            top: 40px;
            right: 60px;
            font-size: 1.8rem;
            font-weight: 300;
            text-shadow: var(--text-shadow);
        }

        .interaction-overlay {
            position: fixed;
            bottom: 30px;
            right: 40px;
            font-size: 0.75rem;
            opacity: 0.4;
            z-index: 20;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 640px) {
            .horizontal-bar { padding-left: 10%; }
            .vertical-bar { left: 10%; margin-left: 40px; }
            .category-item { width: 100px; }
            .clock { right: 20px; top: 20px; font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <canvas id="waves-canvas"></canvas>

    <div class="clock" id="clock">00:00</div>

    <div class="xmb-container">
        <div class="horizontal-bar" id="category-bar"></div>
        <div class="vertical-bar" id="submenu-bar"></div>
    </div>

    <div class="interaction-overlay">
        WASD / Стрелки / Геймпад
    </div>

    <script>
        // --- Данные меню ---
        // Использованы иконки из библиотеки Lucide
        const menuData = [
            { id: 'settings', icon: 'settings', label: 'Настройки', items: ['Системная информация', 'Настройки темы', 'Настройки даты', 'Сетевое соединение'] },
            { id: 'photo', icon: 'image', label: 'Фото', items: ['Галерея', 'Слайдшоу', 'Карта памяти'] },
            { id: 'music', icon: 'music', label: 'Музыка', items: ['Все треки', 'Плейлисты', 'Memory Stick™'] },
            { id: 'video', icon: 'film', label: 'Видео', items: ['Видеофильмы', 'Последние записи'] },
            { id: 'game', icon: 'gamepad-2', label: 'Игра', items: ['Запуск диска', 'Инструменты данных', 'Memory Stick™'] },
            { id: 'network', icon: 'globe', label: 'Сеть', items: ['Браузер', 'Руководство'] }
        ];

        let currentCategory = 4; // По умолчанию на Играх
        let currentSubItem = -1; // -1 означает, что мы на горизонтальной панели

        // --- Звуки ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTick(freq = 440, duration = 0.04) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // --- Анимация волн (Ускорена) ---
        const canvas = document.getElementById('waves-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, lines = [];

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            lines = [];
            for (let i = 0; i < 6; i++) {
                lines.push({
                    y: height / 2,
                    amplitude: 50 + Math.random() * 70,
                    speed: 0.03 + Math.random() * 0.04, // Ускоренная скорость
                    offset: Math.random() * Math.PI * 2,
                    thickness: 1.5,
                    opacity: 0.1 + (i * 0.05)
                });
            }
        }

        function drawWaves() {
            ctx.clearRect(0, 0, width, height);
            const time = Date.now() * 0.001;

            lines.forEach((line) => {
                ctx.beginPath();
                ctx.lineWidth = line.thickness;
                ctx.strokeStyle = `rgba(255, 255, 255, ${line.opacity})`;
                
                for (let x = 0; x <= width; x += 15) {
                    const wave1 = Math.sin(x * 0.0015 + time * line.speed + line.offset) * line.amplitude;
                    const wave2 = Math.sin(x * 0.003 - time * line.speed * 0.8) * (line.amplitude * 0.4);
                    const y = line.y + wave1 + wave2;
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            });
            requestAnimationFrame(drawWaves);
        }

        // --- Логика интерфейса ---
        function renderMenu() {
            const catBar = document.getElementById('category-bar');
            catBar.innerHTML = '';
            
            menuData.forEach((cat, idx) => {
                const div = document.createElement('div');
                div.className = `category-item ${idx === currentCategory ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="category-icon" data-lucide="${cat.icon}"></div>
                    ${idx === currentCategory ? `<div class="category-label">${cat.label}</div>` : ''}
                `;
                catBar.appendChild(div);
            });
            lucide.createIcons();

            // Плавный сдвиг
            const centerOffset = window.innerWidth * 0.15;
            const xOffset = centerOffset - (currentCategory * 140 + 70);
            catBar.style.transform = `translateX(${xOffset}px)`;

            renderSubmenu();
        }

        function renderSubmenu() {
            const subBar = document.getElementById('submenu-bar');
            subBar.innerHTML = '';
            
            const currentData = menuData[currentCategory];
            currentData.items.forEach((item, idx) => {
                const div = document.createElement('div');
                // Визуально активен если выбран, или если мы на горизонтальной панели - первый пункт слегка виден
                const isActive = (idx === currentSubItem);
                div.className = `sub-item visible ${isActive ? 'active' : ''}`;
                div.innerText = item;
                subBar.appendChild(div);
            });
            
            // Вертикальный сдвиг
            const vOffset = currentSubItem >= 0 ? -(currentSubItem * 50) : 0;
            subBar.style.transform = `translateY(${vOffset}px)`;
        }

        function navigate(axis, dir) {
            if (axis === 'h') {
                // Если мы глубоко в меню, переход по горизонтали сбрасывает вертикаль
                currentCategory = (currentCategory + dir + menuData.length) % menuData.length;
                currentSubItem = -1;
                playTick(440);
            } else {
                const max = menuData[currentCategory].items.length;
                if (currentSubItem === -1 && dir === 1) {
                    currentSubItem = 0;
                } else if (currentSubItem === 0 && dir === -1) {
                    currentSubItem = -1;
                } else if (currentSubItem !== -1) {
                    currentSubItem = (currentSubItem + dir + max) % max;
                }
                playTick(currentSubItem === -1 ? 380 : 440);
            }
            renderMenu();
        }

        // --- Управление ---
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'arrowleft' || key === 'a') navigate('h', -1);
            if (key === 'arrowright' || key === 'd') navigate('h', 1);
            if (key === 'arrowup' || key === 'w') navigate('v', -1);
            if (key === 'arrowdown' || key === 's') navigate('v', 1);
            if (key === 'escape') {
                currentSubItem = -1;
                playTick(300);
                renderMenu();
            }
        });

        // Свайпы для мобильных
        let touchStartX = 0, touchStartY = 0;
        window.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: true});
        window.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 40) navigate('h', dx > 0 ? -1 : 1);
            } else {
                if (Math.abs(dy) > 40) navigate('v', dy > 0 ? -1 : 1);
            }
        }, {passive: true});

        // Геймпад
        let lastGpAxes = [0, 0];
        function updateGamepad() {
            const gps = navigator.getGamepads();
            if (gps[0]) {
                const gp = gps[0];
                const ax = gp.axes[0];
                const ay = gp.axes[1];
                
                if (ax < -0.5 && lastGpAxes[0] >= -0.5) navigate('h', -1);
                if (ax > 0.5 && lastGpAxes[0] <= 0.5) navigate('h', 1);
                if (ay < -0.5 && lastGpAxes[1] >= -0.5) navigate('v', -1);
                if (ay > 0.5 && lastGpAxes[1] <= 0.5) navigate('v', 1);
                
                lastGpAxes = [ax, ay];
                if (gp.buttons[1].pressed) { // Кнопка "Назад"
                    currentSubItem = -1;
                    renderMenu();
                }
            }
            setTimeout(updateGamepad, 120);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = 
                now.getHours().toString().padStart(2, '0') + ':' + 
                now.getMinutes().toString().padStart(2, '0');
        }

        window.onload = () => {
            initCanvas();
            drawWaves();
            renderMenu();
            setInterval(updateClock, 1000);
            updateClock();
            updateGamepad();
        };

        window.onresize = initCanvas;
    </script>
</body>
</html>
